    <linearGradient id="shine2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCD00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFCD00" stop-opacity="0"/>
