<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001B5E"/>
      <stop offset="100%" stop-color="#001240"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#g)"/>
  <!-- Jersey number big background -->
  <text x="108" y="155" font-family="Arial Black, sans-serif" font-size="160" font-weight="900" fill="#FFCD00" opacity="0.12" text-anchor="middle" dominant-baseline="auto">8</text>
  <!-- Swedish cross decoration -->
  <rect x="0" y="85" width="200" height="30" fill="#FFCD00" opacity="0.08"/>
  <rect x="55" y="0" width="30" height="200" fill="#FFCD00" opacity="0.08"/>
  <!-- Player initial circle -->
  <circle cx="100" cy="82" r="45" fill="#001B5E" opacity="0.6"/>
  <circle cx="100" cy="82" r="44" fill="none" stroke="#FFCD00" stroke-width="2" opacity="0.4"/>
  <text x="100" y="95" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="#FFCD00" text-anchor="middle" opacity="0.9">B</text>
  <!-- Bottom nameplate -->
  <rect y="155" width="200" height="45" fill="#FFCD00"/>
  <text x="100" y="176" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#001B5E" text-anchor="middle" letter-spacing="1">BERGVALL</text>
  <text x="100" y="192" font-family="Arial, sans-serif" font-size="9" fill="#001B5E" text-anchor="middle" letter-spacing="2" opacity="0.7">MITTFÄLT</text>
</svg>