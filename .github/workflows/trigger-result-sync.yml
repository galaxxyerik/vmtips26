name: Trigger result sync

# Manual trigger for the traffic-driven live result sync. The public
# /api/matches/live endpoint kicks off syncLiveMatchdayMatches (ESPN fetch +
# full point recalculation) via after() when a matchday is in progress.
# Useful when no one is browsing the dashboard right after a final whistle.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/canada-bosnia-score-update-xdid6c

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger live sync (state before)
        run: |
          echo "== Live/scheduled matches before sync =="
          curl -sf https://vmtips26.vercel.app/api/matches/live \
            | jq '{cachedAt, matches: [.matches[] | {match: .fixtureId, home: .homeTeam, away: .awayTeam, score: "\(.homeScore)-\(.awayScore)", status}]}'

      - name: Wait for background sync to complete
        run: sleep 90

      - name: State after sync
        run: |
          echo "== Live/scheduled matches after sync (finished matches drop out) =="
          curl -sf https://vmtips26.vercel.app/api/matches/live \
            | jq '{cachedAt, matches: [.matches[] | {match: .fixtureId, home: .homeTeam, away: .awayTeam, score: "\(.homeScore)-\(.awayScore)", status}]}'

      - name: Show leaderboard totals
        run: |
          echo "== Leaderboard =="
          curl -sf https://vmtips26.vercel.app/api/dashboard/leaderboard \
            | jq -r '.entries[] | "\(.rank). \(.name): \(.totalPoints)p"'

      - name: Verify stored results for finished matches
        env:
          # Public anon key (same one shipped in the client bundle); RLS limits it to public reads
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvenR1eXhjd3VtcXllcWtncXltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTYyNzgsImV4cCI6MjA5MzEzMjI3OH0.VsedQPlsiwB3O8SKJlbW5mrAwopGILsFItqi-aXfkZI
        run: |
          echo "== vmt_matches rows for matches 1-6 =="
          curl -sf 'https://poztuyxcwumqyeqkgqym.supabase.co/rest/v1/vmt_matches?match_number=lte.6&select=match_number,home_team,away_team,home_score,away_score,status,manual_override&order=match_number' \
            -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" | jq .
